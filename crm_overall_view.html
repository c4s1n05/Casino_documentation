<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM Overall View — Flow Graph</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f2f5;
  --c-accent1: #4472c4;   /* blue  — ellipse / action nodes */
  --c-accent2: #ed7d31;   /* orange — rect / question nodes */
  --c-accent3: #a9d18e;   /* green — diamond / yes-no labels */
  --c-accent3d:#548235;   /* dark green for diamond stroke */
  --c-accent4: #ffc000;   /* yellow — rounded rect journey exits */
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Mono', monospace;
  background: var(--bg);
  min-height: 100vh;
}

header {
  background: #1c2333;
  padding: 18px 28px;
  display: flex;
  align-items: center;
  gap: 20px;
}
header h1 {
  font-family: 'Syne', sans-serif;
  font-size: 18px;
  font-weight: 800;
  color: #fff;
}
header p { color: #6b7591; font-size: 11px; margin-top: 3px; }

.legend {
  background: #fff;
  border-bottom: 1px solid #dde0e8;
  padding: 10px 28px;
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  align-items: center;
}
.leg { display: flex; align-items: center; gap: 7px; font-size: 11px; color: #444; font-family: 'DM Mono', monospace; }
.leg-oval   { width:28px; height:16px; border-radius:50%; background:var(--c-accent1); opacity:.85; }
.leg-rect   { width:22px; height:14px; background:var(--c-accent2); border-radius:2px; opacity:.85; }
.leg-diamond-wrap { width:16px; height:16px; display:flex; align-items:center; justify-content:center; }
.leg-diamond { width:13px; height:13px; background:var(--c-accent3); transform:rotate(45deg); border:1px solid var(--c-accent3d); }
.leg-round  { width:26px; height:16px; background:var(--c-accent4); border-radius:8px; opacity:.9; }

.canvas-outer {
  overflow-x: auto;
  overflow-y: auto;
  padding: 24px;
  max-height: calc(100vh - 110px);
}

svg {
  display: block;
  font-family: 'DM Mono', monospace;
  background: #fff;
  border: 1px solid #d0d4de;
  border-radius: 8px;
  box-shadow: 0 2px 12px rgba(0,0,0,.08);
}

/* Shape fills — matching Excel accent colours */
.sh-accent1 { fill: #bdd0ef; stroke: #4472c4; stroke-width: 1.8; }
.sh-accent2 { fill: #fcd3b4; stroke: #ed7d31; stroke-width: 1.8; }
.sh-accent3 { fill: #e2efda; stroke: #70ad47; stroke-width: 1.8; }
.sh-accent4 { fill: #fff2cc; stroke: #d6a300; stroke-width: 1.8; }

text {
  font-family: 'DM Mono', monospace;
  dominant-baseline: middle;
  text-anchor: middle;
}
.lbl      { font-size: 8.5px; fill: #1a1a1a; }
.lbl-bold { font-size: 9px;   fill: #1a1a1a; font-weight: 600; }
.lbl-sm   { font-size: 7.5px; fill: #333; }

/* Connector lines */
.conn { fill: none; stroke: #1a1a1a; stroke-width: 1.3; }
.conn-top { fill: none; stroke: #1a1a1a; stroke-width: 1.3; }

/* Section band labels */
.band-label {
  font-family: 'Syne', sans-serif;
  font-size: 9px;
  font-weight: 700;
  fill: #fff;
  text-anchor: middle;
  dominant-baseline: middle;
  letter-spacing: 0.05em;
}
</style>
</head>
